<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control | Task Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f6f8;
            padding: 16px;
            color: #1a1a1a;
        }
        
        /* Header */
        .header {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            color: #667eea;
            margin-bottom: 8px;
        }
        .refresh-note {
            font-size: 13px;
            color: #6b7280;
        }
        
        /* Stats Grid */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .stat-label {
            font-size: 12px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Section */
        .section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .section h2 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* Agents */
        .agent-grid {
            display: grid;
            gap: 12px;
        }
        .agent-card {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 14px;
        }
        .agent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .agent-name {
            font-weight: 600;
            font-size: 15px;
            color: #1a1a1a;
        }
        .agent-status {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .agent-status.active { background: #d1fae5; color: #065f46; }
        .agent-status.building { background: #fef3c7; color: #92400e; }
        .agent-meta {
            font-size: 13px;
            color: #6b7280;
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
        }
        
        /* Tasks */
        .task-columns {
            display: grid;
            gap: 12px;
        }
        .task-column h3 {
            font-size: 14px;
            font-weight: 600;
            color: #6b7280;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .task-count {
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
        .task-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
        }
        .task-title {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 4px;
        }
        .task-desc {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 8px;
        }
        .task-footer {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #9ca3af;
        }
        
        /* Cost Tracking */
        .cost-grid {
            display: grid;
            gap: 12px;
        }
        .cost-row {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .cost-agent {
            font-weight: 600;
            font-size: 14px;
        }
        .cost-amount {
            font-size: 16px;
            font-weight: bold;
            color: #667eea;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #9ca3af;
        }
        
        /* Tablet and Desktop */
        @media (min-width: 768px) {
            body { padding: 24px; max-width: 1200px; margin: 0 auto; }
            .header h1 { font-size: 32px; }
            .stat-value { font-size: 32px; }
            .task-columns { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚡ Mission Control</h1>
        <p class="refresh-note">Refresh page to update data</p>
    </div>
    
    <div class="stats" id="stats">
        <div class="loading">Loading...</div>
    </div>
    
    <div class="section">
        <h2>🤖 Active Agents</h2>
        <div class="agent-grid" id="agents">
            <div class="loading">Loading agents...</div>
        </div>
    </div>
    
    <div class="section">
        <h2>📋 Tasks</h2>
        <div class="task-columns" id="tasks">
            <div class="loading">Loading tasks...</div>
        </div>
    </div>
    
    <div class="section">
        <h2>💰 Cost Tracking</h2>
        <div class="cost-grid" id="costs">
            <div class="loading">Loading costs...</div>
        </div>
    </div>
    
    <script>
        async function loadDashboard() {
            try {
                // Load all data
                const [tasksRes, costsRes] = await Promise.all([
                    fetch('./tasks.json?t=' + Date.now()),
                    fetch('./cost-tracking-data.json?t=' + Date.now())
                ]);
                
                const tasksData = await tasksRes.json();
                const costsData = await costsRes.json();
                
                // Render stats
                renderStats(tasksData, costsData);
                
                // Render agents
                renderAgents(costsData.agents);
                
                // Render tasks
                renderTasks(tasksData.tasks || tasksData);
                
                // Render costs
                renderCosts(costsData);
                
            } catch (error) {
                console.error('Error loading dashboard:', error);
                document.body.innerHTML += '<div class="section"><p style="color: #ef4444; text-align: center;">Failed to load data. Refresh to try again.</p></div>';
            }
        }
        
        function renderStats(tasksData, costsData) {
            const tasks = tasksData.tasks || tasksData;
            const activeAgents = costsData.agents.filter(a => a.status === 'active').length;
            const totalTasks = tasks.length;
            const totalCost = costsData.totals.monthCost || costsData.totals.totalCost || 0;
            
            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${activeAgents}</div>
                    <div class="stat-label">Agents Active</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${totalTasks}</div>
                    <div class="stat-label">Total Tasks</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">$${totalCost.toFixed(2)}</div>
                    <div class="stat-label">Total Cost</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${costsData.totals.totalCalls || 0}</div>
                    <div class="stat-label">API Calls</div>
                </div>
            `;
        }
        
        function renderAgents(agents) {
            if (!agents || agents.length === 0) {
                document.getElementById('agents').innerHTML = '<p style="color: #9ca3af;">No agents found.</p>';
                return;
            }
            
            document.getElementById('agents').innerHTML = agents.map(agent => `
                <div class="agent-card">
                    <div class="agent-header">
                        <div class="agent-name">${agent.name}</div>
                        <div class="agent-status ${agent.status}">${agent.status}</div>
                    </div>
                    <div style="font-size: 13px; color: #6b7280;">${agent.fullName}</div>
                    <div class="agent-meta">
                        <span>${agent.tasksCompleted || 0} tasks</span>
                        <span>$${(agent.totalCost || 0).toFixed(2)}</span>
                    </div>
                </div>
            `).join('');
        }
        
        function renderTasks(tasks) {
            if (!tasks || tasks.length === 0) {
                document.getElementById('tasks').innerHTML = '<p style="color: #9ca3af;">No tasks found.</p>';
                return;
            }
            
            const columns = {
                inbox: tasks.filter(t => t.status === 'inbox'),
                assigned: tasks.filter(t => t.status === 'assigned'),
                'in-progress': tasks.filter(t => t.status === 'in-progress' || t.status === 'in_progress'),
                done: tasks.filter(t => t.status === 'done')
            };
            
            const columnTitles = {
                inbox: '📥 Inbox',
                assigned: '👤 Assigned',
                'in-progress': '⚡ In Progress',
                done: '✅ Done'
            };
            
            document.getElementById('tasks').innerHTML = Object.keys(columns).map(status => `
                <div class="task-column">
                    <h3>
                        ${columnTitles[status]}
                        <span class="task-count">${columns[status].length}</span>
                    </h3>
                    ${columns[status].map(task => `
                        <div class="task-card">
                            <div class="task-title">${task.title}${task.recurring ? ' 🔄' : ''}</div>
                            ${task.description ? `<div class="task-desc">${task.description.substring(0, 80)}${task.description.length > 80 ? '...' : ''}</div>` : ''}
                            <div class="task-footer">
                                <span>${task.assignedAgent || 'Unassigned'}</span>
                                <span>${task.priority || 'normal'}</span>
                            </div>
                        </div>
                    `).join('') || '<p style="color: #9ca3af; font-size: 12px;">No tasks</p>'}
                </div>
            `).join('');
        }
        
        function renderCosts(costsData) {
            if (!costsData.agents || costsData.agents.length === 0) {
                document.getElementById('costs').innerHTML = '<p style="color: #9ca3af;">No cost data available.</p>';
                return;
            }
            
            const agentsWithCost = costsData.agents.filter(a => (a.totalCost || 0) > 0);
            
            document.getElementById('costs').innerHTML = `
                <div class="cost-row" style="background: #667eea; color: white;">
                    <div class="cost-agent">Total</div>
                    <div class="cost-amount" style="color: white;">$${costsData.totals.totalCost.toFixed(2)}</div>
                </div>
                ${agentsWithCost.map(agent => `
                    <div class="cost-row">
                        <div class="cost-agent">${agent.name}</div>
                        <div class="cost-amount">$${(agent.totalCost || 0).toFixed(2)}</div>
                    </div>
                `).join('') || '<p style="color: #9ca3af; font-size: 13px; padding: 12px;">No cost data yet.</p>'}
            `;
        }
        
        // Load on page load
        loadDashboard();
    </script>
</body>
</html>
