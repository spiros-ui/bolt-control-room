<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Mission Control - Working Version</title>
    <style>
        body { font-family: system-ui; padding: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; }
        h1 { color: #1a1a1a; margin-bottom: 30px; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 8px; }
        .stat-value { font-size: 32px; font-weight: bold; margin: 10px 0; }
        .stat-label { font-size: 14px; opacity: 0.9; }
        .agent-list { margin-top: 30px; }
        .agent-item { background: #f9fafb; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .usage-table { width: 100%; margin-top: 30px; border-collapse: collapse; }
        .usage-table th { background: #f3f4f6; padding: 12px; text-align: left; border-bottom: 2px solid #e5e7eb; }
        .usage-table td { padding: 12px; border-bottom: 1px solid #e5e7eb; }
        .error { background: #fee; color: #c00; padding: 15px; border-radius: 8px; margin: 20px 0; }
        .loading { text-align: center; padding: 40px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Mission Control - Cost Tracking</h1>
        
        <div id="loading" class="loading">Loading data...</div>
        <div id="error" class="error" style="display:none;"></div>
        <div id="content" style="display:none;">
            
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-label">Total Cost (Today)</div>
                    <div class="stat-value" id="total-cost">$0.00</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total API Calls</div>
                    <div class="stat-value" id="total-calls">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Tasks Completed</div>
                    <div class="stat-value" id="tasks-completed">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Avg Cost/Task</div>
                    <div class="stat-value" id="avg-cost">$0.000</div>
                </div>
            </div>

            <h2>💼 Agent Breakdown</h2>
            <div class="agent-list" id="agent-list"></div>

            <h2>📊 Recent Usage</h2>
            <table class="usage-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Agent</th>
                        <th>Task</th>
                        <th>Model</th>
                        <th>Calls</th>
                        <th>Cost</th>
                    </tr>
                </thead>
                <tbody id="usage-tbody"></tbody>
            </table>
        </div>
    </div>

    <script>
        console.log('Script starting...');
        
        async function loadData() {
            try {
                console.log('Fetching from: http://138.68.161.145:8086/api/cost-tracking');
                
                const response = await fetch('http://138.68.161.145:8086/api/cost-tracking?t=' + Date.now());
                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }
                
                const data = await response.json();
                console.log('Data received:', data);
                
                // Update stats
                document.getElementById('total-cost').textContent = '$' + data.totals.todayCost.toFixed(2);
                document.getElementById('total-calls').textContent = data.totals.totalCalls;
                document.getElementById('tasks-completed').textContent = data.totals.totalTasks;
                document.getElementById('avg-cost').textContent = '$' + data.totals.avgCostPerTask.toFixed(3);
                
                // Update agents
                const agentList = document.getElementById('agent-list');
                agentList.innerHTML = data.agents.map(agent => `
                    <div class="agent-item">
                        <div>
                            <strong>${agent.name}</strong>
                            <span style="color: #666; margin-left: 10px;">${agent.fullName}</span>
                        </div>
                        <div>
                            ${agent.totalCalls} calls | $${agent.totalCost.toFixed(3)} | ${agent.tasksCompleted} tasks
                        </div>
                    </div>
                `).join('');
                
                // Update usage table
                const tbody = document.getElementById('usage-tbody');
                tbody.innerHTML = data.usage.map(row => `
                    <tr>
                        <td>${row.date}</td>
                        <td>${row.agent}</td>
                        <td>${row.task}</td>
                        <td>${row.model}</td>
                        <td>${row.calls}</td>
                        <td>$${row.cost.toFixed(2)}</td>
                    </tr>
                `).join('');
                
                // Show content, hide loading
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                
                console.log('✅ Data loaded successfully!');
                
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = 'Error: ' + error.message + ' - Check console for details';
            }
        }
        
        // Load immediately
        loadData();
        
        // Refresh every 10 seconds
        setInterval(loadData, 10000);
    </script>
</body>
</html>
