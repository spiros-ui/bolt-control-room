<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Dashboard | ClickThrive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
        }
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 10px 20px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        .filter-btn:hover {
            background: #334155;
        }
        .filter-btn.active {
            background: #667eea;
            border-color: #667eea;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 8px;
        }
        .stat-label {
            font-size: 14px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 24px;
        }
        .story-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }
        .story-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(102, 126, 234, 0.2);
            border-color: #667eea;
        }
        .story-screenshot {
            width: 100%;
            height: 200px;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #334155;
        }
        .story-screenshot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .story-screenshot.placeholder {
            color: #475569;
            font-size: 48px;
        }
        .story-content {
            padding: 20px;
        }
        .story-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .story-source {
            font-size: 12px;
            color: #667eea;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .story-score {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: #fbbf24;
        }
        .story-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            line-height: 1.4;
            color: #f1f5f9;
        }
        .story-summary {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 16px;
        }
        .story-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid #334155;
        }
        .story-date {
            font-size: 12px;
            color: #64748b;
        }
        .story-link {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .story-link:hover {
            background: #5568d3;
        }
        .loading {
            text-align: center;
            padding: 60px;
            font-size: 18px;
            color: #64748b;
        }
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #64748b;
        }
        .empty-state h2 {
            font-size: 24px;
            margin-bottom: 12px;
        }
        .last-updated {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            background: #1e293b;
            border-radius: 8px;
            font-size: 14px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📰 AI News Dashboard</h1>
            <p>Latest updates from OpenClaw, Claude, AI research & more</p>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All Sources</button>
            <button class="filter-btn" data-filter="openclaw">OpenClaw</button>
            <button class="filter-btn" data-filter="claude">Claude</button>
            <button class="filter-btn" data-filter="twitter">Twitter</button>
            <button class="filter-btn" data-filter="reddit">Reddit</button>
            <button class="filter-btn" data-filter="youtube">YouTube</button>
            <button class="filter-btn" data-filter="today">Today</button>
            <button class="filter-btn" data-filter="high-score">High Relevance (8+)</button>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="total-stories">0</div>
                <div class="stat-label">Total Stories</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="today-stories">0</div>
                <div class="stat-label">Today</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="high-relevance">0</div>
                <div class="stat-label">High Relevance</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="sources-count">0</div>
                <div class="stat-label">Active Sources</div>
            </div>
        </div>

        <div class="stories-grid" id="stories-container">
            <div class="loading">Loading stories...</div>
        </div>

        <div class="last-updated" id="last-updated">
            Last updated: Loading...
        </div>
    </div>

    <script>
        let allStories = [];
        let currentFilter = 'all';

        // Load stories from JSON
        async function loadStories() {
            try {
                const response = await fetch('stories.json?t=' + Date.now());
                const data = await response.json();
                allStories = data.stories || [];
                updateStats(data);
                renderStories();
            } catch (error) {
                document.getElementById('stories-container').innerHTML = `
                    <div class="empty-state">
                        <h2>No stories yet</h2>
                        <p>Check back at 7 AM for today's AI news digest</p>
                    </div>
                `;
            }
        }

        function updateStats(data) {
            document.getElementById('total-stories').textContent = allStories.length;
            document.getElementById('today-stories').textContent = data.todayCount || 0;
            document.getElementById('high-relevance').textContent = data.highRelevanceCount || 0;
            document.getElementById('sources-count').textContent = data.sourcesCount || 0;
            document.getElementById('last-updated').textContent = 
                `Last updated: ${data.lastUpdated || 'Never'}`;
        }

        function renderStories() {
            const container = document.getElementById('stories-container');
            
            let filtered = allStories;
            
            // Apply filters
            if (currentFilter !== 'all') {
                if (currentFilter === 'today') {
                    const today = new Date().toISOString().split('T')[0];
                    filtered = allStories.filter(s => s.date.startsWith(today));
                } else if (currentFilter === 'high-score') {
                    filtered = allStories.filter(s => s.score >= 8);
                } else {
                    filtered = allStories.filter(s => 
                        s.source.toLowerCase().includes(currentFilter.toLowerCase())
                    );
                }
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h2>No stories found</h2>
                        <p>Try a different filter</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(story => `
                <div class="story-card" onclick="window.open('${story.url}', '_blank')">
                    <div class="story-screenshot ${story.screenshot ? '' : 'placeholder'}">
                        ${story.screenshot 
                            ? `<img src="${story.screenshot}" alt="${story.title}">` 
                            : '📰'
                        }
                    </div>
                    <div class="story-content">
                        <div class="story-meta">
                            <div class="story-source">${story.source}</div>
                            <div class="story-score">
                                ⭐ ${story.score}/10
                            </div>
                        </div>
                        <div class="story-title">${story.title}</div>
                        <div class="story-summary">${story.summary}</div>
                        <div class="story-footer">
                            <div class="story-date">${formatDate(story.date)}</div>
                            <a href="${story.url}" class="story-link" target="_blank" onclick="event.stopPropagation()">
                                Read More →
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diffHours = Math.floor((now - date) / (1000 * 60 * 60));
            
            if (diffHours < 1) return 'Just now';
            if (diffHours < 24) return `${diffHours}h ago`;
            
            const diffDays = Math.floor(diffHours / 24);
            if (diffDays === 1) return 'Yesterday';
            if (diffDays < 7) return `${diffDays} days ago`;
            
            return date.toLocaleDateString();
        }

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderStories();
            });
        });

        // Auto-refresh every 5 minutes
        setInterval(loadStories, 5 * 60 * 1000);

        // Initial load
        loadStories();
    </script>
</body>
</html>
