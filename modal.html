    <!-- New Task Modal -->
    <div id="new-task-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create New Task</h2>
                <button class="modal-close">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="task-title">Task Title *</label>
                    <input type="text" id="task-title" placeholder="e.g., Generate Santorini hero video">
                </div>
                <div class="form-group">
                    <label for="task-description">Description *</label>
                    <textarea id="task-description" placeholder="Describe what needs to be done..."></textarea>
                </div>
                <div class="form-group">
                    <label for="task-priority">Priority</label>
                    <select id="task-priority">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-cancel">Cancel</button>
                <button class="btn btn-submit">Create Task</button>
            </div>
        </div>
    </div>
